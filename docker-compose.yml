services:
  # ─── Redis 7.2 ────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: askagent_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
  # ─── Qdrant ───────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: askagent_qdrant
    restart: unless-stopped
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:6333/healthz || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  redis_data:
  qdrant_data:
