services:
  # ─── Backend (Node.js / Express) ──────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: askagent_server
    restart: unless-stopped
    ports:
      - '${PORT:-5000}:5000'
    volumes:
      # Bind-mount the entire source so nodemon picks up changes
      - .:/app
      # Named volume overlays node_modules — the container gets its own
      # Linux-native binaries, independent of whatever the host has installed.
      # Run this once to populate it:  docker compose run --rm server npm install
      - server_node_modules:/app/node_modules
    env_file:
      - .env
    environment:
      # Use MONGODB_URI from .env (MongoDB Atlas)
      REDIS_URL:   redis://redis:6379
      REDIS_HOST:  redis
      REDIS_PORT:  '6379'
      QDRANT_URL:  http://qdrant:6333
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  # ─── Redis 7.2 ────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: askagent_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
  # ─── Qdrant ───────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: askagent_qdrant
    restart: unless-stopped
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:6333/healthz || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  server_node_modules:   # Linux-native node_modules for the server container
  redis_data:
  qdrant_data:
